<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🌟 Spelling Game — Week 12</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow-x: hidden;
    }

    /* ── Floating background emojis ── */
    .bg-emoji {
      position: fixed;
      opacity: 0.12;
      animation: floatUp linear infinite;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) rotate(0deg); }
      100% { transform: translateY(-15vh) rotate(360deg); }
    }

    /* ── Layout ── */
    .game-wrap {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 1rem 1rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    /* ── Header ── */
    .header { width: 100%; text-align: center; color: white; }
    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      text-shadow: 2px 3px 6px rgba(0,0,0,0.25);
    }
    .header p { opacity: 0.85; font-size: 0.9rem; margin-top: 0.15rem; }

    /* ── Progress stars ── */
    .progress { display: flex; gap: 0.3rem; justify-content: center; flex-wrap: wrap; margin-top: 0.4rem; }
    .pstar {
      font-size: 1.6rem;
      filter: grayscale(1) brightness(0.55);
      transition: filter 0.3s, transform 0.3s;
    }
    .pstar.earned {
      filter: none;
      animation: starPop 0.55s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes starPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.7) rotate(-10deg); }
      100% { transform: scale(1); }
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 1.4rem 1.2rem 1.6rem;
      width: 100%;
      box-shadow: 0 12px 44px rgba(0,0,0,0.22);
      text-align: center;
    }

    .level-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-weight: 800;
      padding: 0.25rem 1.1rem;
      border-radius: 20px;
      font-size: 0.88rem;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .word-emoji {
      display: block;
      font-size: 4.5rem;
      margin: 0.2rem 0 0.4rem;
      animation: bop 1.8s ease-in-out infinite;
    }
    @keyframes bop {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-12px) rotate(3deg); }
    }

    /* ── Hint word display ── */
    .hint-display {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      color: #495057;
      letter-spacing: 4px;
      min-height: 3rem;
      transition: opacity 0.8s;
    }

    /* ── Letter slots ── */
    .slots-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      justify-content: center;
      margin: 0.9rem 0 0.6rem;
    }

    .slot {
      width: 46px;
      height: 54px;
      border: 3px dashed #ced4da;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      background: #f8f9fa;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }
    .slot.over {
      border-color: #667eea;
      background: #eef0ff;
      transform: scale(1.12);
    }
    .slot.correct {
      border: 3px solid #51cf66;
      background: #ebfbee;
      color: #2f9e44;
      cursor: default;
      animation: correctPop 0.35s ease;
    }
    @keyframes correctPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    .slot.wrong-shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-7px); }
      80%     { transform: translateX(7px); }
    }

    /* ── Letter bank ── */
    .bank-label {
      font-size: 0.8rem;
      color: #868e96;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.35rem;
    }
    .letter-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      justify-content: center;
      min-height: 64px;
      padding: 0.6rem;
      background: #f1f3f5;
      border-radius: 18px;
    }

    .tile {
      width: 46px;
      height: 54px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: white;
      cursor: grab;
      user-select: none;
      touch-action: none;
      box-shadow: 0 5px 10px rgba(0,0,0,0.18);
      transition: transform 0.15s, box-shadow 0.15s, outline 0.1s;
      animation: tileAppear 0.4s cubic-bezier(.175,.885,.32,1.275) backwards;
    }
    .tile:hover {
      transform: translateY(-4px) scale(1.07);
      box-shadow: 0 10px 18px rgba(0,0,0,0.22);
    }
    .tile.selected {
      transform: translateY(-7px) scale(1.12);
      box-shadow: 0 14px 24px rgba(0,0,0,0.28);
      outline: 3px solid white;
    }
    .tile.ghost { opacity: 0.35; cursor: grabbing; }
    @keyframes tileAppear {
      from { transform: translateY(30px) scale(0.7); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    /* ── Buttons ── */
    .btn-row { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.2); }
    .btn:active { transform: translateY(0); }
    .btn-hint { background: #ffd43b; color: #5c3d00; }
    .btn-next {
      background: linear-gradient(135deg, #51cf66, #2f9e44);
      color: white;
      font-size: 1.1rem;
      padding: 0.75rem 2rem;
      display: none;
    }
    .btn-next.show {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

    /* ── Confetti ── */
    .confetti-bit {
      position: fixed;
      border-radius: 2px;
      pointer-events: none;
      top: -12px;
      animation: cFall linear forwards;
    }
    @keyframes cFall {
      0%   { transform: translateY(0) rotate(0deg);    opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Completion overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .overlay-card {
      background: white;
      border-radius: 28px;
      padding: 2.4rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 92%;
      animation: popIn 0.5s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .overlay-card h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.8rem;
      color: #f59f00;
      margin: 0.3rem 0;
    }

    /* ── Touch ghost ── */
    #touch-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      opacity: 0.85;
      transform: translate(-50%, -50%) scale(1.1);
      display: none;
      border-radius: 12px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: white;
      width: 50px;
      height: 58px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<!-- Touch drag ghost -->
<div id="touch-ghost"></div>

<!-- Completion overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div style="font-size:4.5rem;line-height:1">🏆</div>
    <h2>You Did It!</h2>
    <p style="font-size:1.05rem;color:#495057;margin:0.5rem 0 0.8rem">All 10 words complete!</p>
    <p style="font-size:2.2rem">⭐⭐⭐⭐⭐</p>
    <button class="btn btn-next show" onclick="restartGame()" style="margin-top:1.2rem">Play Again 🔄</button>
  </div>
</div>

<div class="game-wrap">
  <!-- Header -->
  <div class="header">
    <h1>🌟 Spelling Game</h1>
    <p>Week 12 · Grade 1</p>
    <div class="progress" id="progress"></div>
  </div>

  <!-- Game card -->
  <div class="card">
    <div class="level-badge" id="level-badge">Level 1 / 10</div>
    <span class="word-emoji" id="word-emoji"></span>
    <div class="hint-display" id="hint-display"></div>

    <div class="slots-wrap" id="slots"></div>

    <div class="bank-label">Drag or tap the letters ✏️</div>
    <div class="letter-bank" id="bank"></div>

    <div class="btn-row">
      <button class="btn btn-hint" onclick="showHint()">💡 Hint</button>
      <button class="btn btn-next" id="next-btn" onclick="nextLevel()">Next Word ➡️</button>
    </div>
  </div>
</div>

<script>
// ── Data ────────────────────────────────────────────────────────
const WORDS = [
  { word: 'difficult',  emoji: '🤔' },
  { word: 'different',  emoji: '🦋' },
  { word: 'hockey',     emoji: '🏒' },
  { word: 'unicycle',   emoji: '🎪' },
  { word: 'rocket',     emoji: '🚀' },
  { word: 'basketball', emoji: '🏀' },
  { word: 'bounce',     emoji: '⚡' },
  { word: 'insect',     emoji: '🐛' },
  { word: 'baseball',   emoji: '⚾' },
  { word: 'paint',      emoji: '🎨' },
];

const TILE_PALETTE = [
  ['#FF6B6B','#ee5a24'],['#fdcb6e','#e17055'],['#6c5ce7','#a29bfe'],
  ['#00b894','#55efc4'],['#0984e3','#74b9ff'],['#fd79a8','#e84393'],
  ['#00cec9','#81ecec'],['#e17055','#fab1a0'],['#2d3436','#636e72'],
  ['#6c5ce7','#fd79a8'],
];

// ── State ─────────────────────────────────────────────────────
let level = 0;
let earned = 0;
let selected = null;   // currently selected tile element
let dragging = null;   // mouse-drag tile element
let audioCtx = null;

// ── Audio ─────────────────────────────────────────────────────
function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, type, dur, vol = 0.3) {
  try {
    const c = ctx(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
    o.start(); o.stop(c.currentTime + dur);
  } catch {}
}
function sndCorrect()       { [523,659,784].forEach((f,i) => setTimeout(() => beep(f,'sine',0.2,0.35), i*90)); }
function sndWrong()         { beep(180,'sawtooth',0.25,0.25); }
function sndLevelComplete() { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f,'sine',0.35,0.45), i*110)); }

// ── Helpers ───────────────────────────────────────────────────
function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

// ── Background floating emojis ────────────────────────────────
function spawnBgEmojis() {
  ['⭐','🌟','✨','💫','🎈','🎉','🌈','🦄','🎯','🏆','🎀','🎊'].forEach((e,i) => {
    const el = document.createElement('div');
    el.className = 'bg-emoji';
    el.textContent = e;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      font-size:${1.5+Math.random()*2.5}rem;
      animation-duration:${9+Math.random()*12}s;
      animation-delay:${Math.random()*12}s;
    `;
    document.body.appendChild(el);
  });
}

// ── Progress stars ─────────────────────────────────────────────
function renderProgress() {
  const c = document.getElementById('progress');
  c.innerHTML = '';
  WORDS.forEach((_,i) => {
    const s = document.createElement('span');
    s.className = 'pstar' + (i < earned ? ' earned' : '');
    s.textContent = '⭐';
    c.appendChild(s);
  });
}

// ── Load level ─────────────────────────────────────────────────
function loadLevel(idx) {
  const { word, emoji } = WORDS[idx];
  selected = null; dragging = null;

  document.getElementById('level-badge').textContent = `Level ${idx+1} / ${WORDS.length}`;
  document.getElementById('word-emoji').textContent = emoji;
  document.getElementById('hint-display').textContent = '';
  document.getElementById('hint-display').style.opacity = '1';
  document.getElementById('next-btn').classList.remove('show');

  // Slots
  const slotsEl = document.getElementById('slots');
  slotsEl.innerHTML = '';
  [...word].forEach((letter, i) => {
    const s = document.createElement('div');
    s.className = 'slot';
    s.dataset.letter = letter;
    s.dataset.pos = i;

    s.addEventListener('dragover',  e => { e.preventDefault(); if (!s.classList.contains('correct')) s.classList.add('over'); });
    s.addEventListener('dragleave', () => s.classList.remove('over'));
    s.addEventListener('drop',      e => { e.preventDefault(); s.classList.remove('over'); tryPlace(s); });
    s.addEventListener('click',     () => { if (!s.classList.contains('correct')) tryPlace(s); });

    slotsEl.appendChild(s);
  });

  // Letter bank — shuffle, deduplicate display indices
  const bankEl = document.getElementById('bank');
  bankEl.innerHTML = '';
  const letters = shuffle([...word]);
  letters.forEach((letter, i) => {
    const t = document.createElement('div');
    t.className = 'tile';
    t.textContent = letter;
    t.dataset.letter = letter;
    const pal = TILE_PALETTE[i % TILE_PALETTE.length];
    t.style.background = `linear-gradient(135deg, ${pal[0]}, ${pal[1]})`;
    t.style.animationDelay = `${i * 0.055}s`;

    // Mouse drag
    t.draggable = true;
    t.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text', letter);
      dragging = t;
      setTimeout(() => t.classList.add('ghost'), 0);
    });
    t.addEventListener('dragend', () => {
      t.classList.remove('ghost');
      dragging = null;
    });

    // Click select
    t.addEventListener('click', () => {
      if (selected === t) { deselect(); return; }
      deselect();
      selected = t;
      t.classList.add('selected');
    });

    // Touch
    t.addEventListener('touchstart', onTouchStart, { passive: false });
    t.addEventListener('touchmove',  onTouchMove,  { passive: false });
    t.addEventListener('touchend',   onTouchEnd,   { passive: false });

    bankEl.appendChild(t);
  });
}

function deselect() {
  if (selected) { selected.classList.remove('selected'); selected = null; }
}

// ── Place logic ────────────────────────────────────────────────
function tryPlace(slot) {
  const tile = dragging || selected;
  if (!tile || slot.classList.contains('correct')) return;

  if (tile.dataset.letter === slot.dataset.letter) {
    // ✅ Correct
    slot.textContent = tile.dataset.letter;
    slot.classList.add('correct');
    tile.remove();
    sndCorrect();

    const allDone = [...document.querySelectorAll('.slot')].every(s => s.classList.contains('correct'));
    if (allDone) setTimeout(onWordComplete, 350);
  } else {
    // ❌ Wrong
    slot.classList.add('wrong-shake');
    setTimeout(() => slot.classList.remove('wrong-shake'), 450);
    sndWrong();
  }

  deselect();
  dragging = null;
}

// ── Word complete ──────────────────────────────────────────────
function onWordComplete() {
  earned = level + 1;
  renderProgress();
  sndLevelComplete();
  confetti(45);

  const btn = document.getElementById('next-btn');
  if (level >= WORDS.length - 1) {
    setTimeout(() => {
      document.getElementById('overlay').classList.add('show');
      confetti(90);
    }, 800);
  } else {
    btn.classList.add('show');
  }
}

function nextLevel() {
  level++;
  if (level < WORDS.length) loadLevel(level);
}

function restartGame() {
  level = 0; earned = 0;
  document.getElementById('overlay').classList.remove('show');
  renderProgress();
  loadLevel(0);
}

// ── Hint ───────────────────────────────────────────────────────
function showHint() {
  const el = document.getElementById('hint-display');
  el.style.opacity = '1';
  el.textContent = WORDS[level].word;
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = ''; el.style.opacity = '1'; }, 850);
  }, 2200);
}

// ── Confetti ───────────────────────────────────────────────────
const CC = ['#FF6B6B','#FFC300','#4ECDC4','#A29BFE','#FD79A8','#55EFC4','#FDCB6E','#74b9ff'];
function confetti(n) {
  for (let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-bit';
    const size = 7 + Math.random() * 8;
    el.style.cssText = `
      left:${Math.random()*100}vw;
      width:${size}px; height:${size}px;
      background:${CC[~~(Math.random()*CC.length)]};
      animation-duration:${1.6+Math.random()*2}s;
      animation-delay:${Math.random()*0.5}s;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ── Touch drag ─────────────────────────────────────────────────
const ghost = document.getElementById('touch-ghost');
let touchTile = null;

function onTouchStart(e) {
  e.preventDefault();
  touchTile = e.currentTarget;
  dragging = touchTile;
  const t = e.touches[0];
  ghost.textContent = touchTile.textContent;
  ghost.style.background = touchTile.style.background;
  ghost.style.display = 'flex';
  moveGhost(t.clientX, t.clientY);
}

function onTouchMove(e) {
  e.preventDefault();
  if (!touchTile) return;
  const t = e.touches[0];
  moveGhost(t.clientX, t.clientY);
  // Highlight slot under finger
  ghost.style.display = 'none';
  const under = document.elementFromPoint(t.clientX, t.clientY);
  ghost.style.display = 'flex';
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('over'));
  if (under?.classList.contains('slot') && !under.classList.contains('correct'))
    under.classList.add('over');
}

function onTouchEnd(e) {
  e.preventDefault();
  ghost.style.display = 'none';
  if (!touchTile) return;
  const t = e.changedTouches[0];
  ghost.style.display = 'none';
  const under = document.elementFromPoint(t.clientX, t.clientY);
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('over'));
  if (under?.classList.contains('slot')) tryPlace(under);
  touchTile = null;
  dragging = null;
}

function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top  = y + 'px';
}

// ── Init ───────────────────────────────────────────────────────
spawnBgEmojis();
renderProgress();
loadLevel(0);
</script>
</body>
</html>
