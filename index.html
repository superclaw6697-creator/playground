<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" />
  <title>Playground</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111111;
      line-height: 1.6;
    }

    header {
      padding: 2rem;
      border-bottom: 1px solid #e5e5e5;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #888;
      font-size: 0.875rem;
      border-top: 1px solid #e5e5e5;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .card {
      display: block;
      padding: 1.5rem;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      transform: translateY(-3px);
    }
    .card .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.25rem; }
    .card p { font-size: 0.875rem; color: #555; }
  </style>
</head>
<body>
  <header>
    <h1>Playground</h1>
  </header>

  <main>
    <p>Welcome.</p>
    <div class="card-grid">
      <a class="card" href="grade_1/scramble_word_game.html">
        <div class="icon">🌟</div>
        <h2>Scramble Word Game</h2>
        <p>Grade 1 · Multiple word lists · Drag &amp; drop spelling</p>
      </a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026</p>
  </footer>
</body>
</html>
