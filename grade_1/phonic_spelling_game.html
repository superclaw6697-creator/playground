<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🔊 Phonic Spelling Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <script src="phonic_word_list.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:   #20c997;
      --teal2:  #0ca678;
      --orange: #ff922b;
      --yellow: #ffd43b;
      --red:    #ff4757;
      --purple: #845ef7;
    }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #20c997 0%, #0ca678 100%);
      overflow-x: hidden;
    }

    .bg-emoji {
      position: fixed; opacity: 0.08; pointer-events: none;
      animation: floatUp linear infinite; z-index: 0;
      font-size: 2.5rem; user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-15vh) rotate(360deg); }
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      padding: 1rem 1rem 4rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.9rem;
    }

    /* ── Header ── */
    .header { width: 100%; text-align: center; color: white; }
    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.2rem;
      text-shadow: 2px 3px 6px rgba(0,0,0,0.2);
    }
    .header p { opacity: 0.85; font-size: 0.9rem; margin-top: 0.15rem; }

    /* ── List selection ── */
    #screen-select { width: 100%; }
    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem; margin-top: 0.5rem;
    }
    .list-card {
      background: white; border-radius: 20px; padding: 1.4rem 1rem;
      text-align: center; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      transition: transform 0.18s, box-shadow 0.18s;
      border: 3px solid transparent;
    }
    .list-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.2);
      border-color: var(--yellow);
    }
    .list-card .lc-emoji { font-size: 2.8rem; display: block; margin-bottom: 0.4rem; }
    .list-card .lc-name  { font-weight: 800; font-size: 1rem; color: #333; }
    .list-card .lc-count { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }

    /* ── Count picker ── */
    #screen-count { width: 100%; display: none; }
    .count-card {
      background: white; border-radius: 24px; padding: 1.6rem 1.4rem;
      text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .count-card h2 { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: #333; }
    .count-card p  { color: #888; font-size: 0.9rem; margin: 0.3rem 0 1rem; }
    .count-btns { display: flex; gap: 0.7rem; flex-wrap: wrap; justify-content: center; }
    .count-btn {
      padding: 0.55rem 1.2rem; border-radius: 50px; border: none;
      background: var(--teal); color: white;
      font-family: 'Fredoka One', cursive; font-size: 1.1rem;
      cursor: pointer; transition: transform 0.15s;
    }
    .count-btn:hover { transform: scale(1.08); }

    /* ── Game screen ── */
    #screen-game { width: 100%; display: none; flex-direction: column; gap: 0.8rem; }

    .prog-bar-wrap {
      width: 100%; background: rgba(255,255,255,0.25);
      border-radius: 50px; height: 10px;
    }
    .prog-bar {
      height: 10px; border-radius: 50px; background: white;
      transition: width 0.4s ease;
    }
    .prog-label { color: white; font-size: 0.85rem; text-align: right; margin-top: 0.2rem; }

    .game-card {
      background: white; border-radius: 28px; padding: 1.8rem 1.4rem;
      width: 100%; text-align: center;
      box-shadow: 0 12px 36px rgba(0,0,0,0.15);
    }

    .word-emoji { font-size: 4rem; line-height: 1; margin-bottom: 0.5rem; }

    /* listen button */
    .listen-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 2rem; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--teal), var(--teal2));
      color: white; font-family: 'Fredoka One', cursive; font-size: 1.3rem;
      cursor: pointer; box-shadow: 0 6px 18px rgba(32,201,151,0.4);
      transition: transform 0.15s;
      margin-bottom: 1.2rem;
    }
    .listen-btn:hover { transform: scale(1.05); }
    .listen-btn.speaking { animation: pulse 0.7s ease infinite alternate; }
    @keyframes pulse {
      from { box-shadow: 0 6px 18px rgba(32,201,151,0.4); transform: scale(1); }
      to   { box-shadow: 0 10px 30px rgba(32,201,151,0.7); transform: scale(1.06); }
    }

    /* ── Letter boxes ── */
    .boxes-row {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.5rem; margin-bottom: 0.9rem;
    }

    /* wrapper: box + mic below */
    .box-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    }

    .letter-box {
      width: 52px; height: 60px;
      border: 3px solid #dee2e6; border-radius: 12px;
      font-family: 'Fredoka One', cursive; font-size: 1.7rem;
      text-align: center; color: #333;
      outline: none; text-transform: uppercase;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
      background: #f8f9fa;
      caret-color: transparent;
    }
    .letter-box:focus {
      border-color: var(--teal); background: #e6fcf5;
      transform: scale(1.08);
    }
    .letter-box.correct {
      border-color: var(--teal2); background: #d3f9d8; color: var(--teal2);
      animation: popIn 0.22s ease;
    }
    .letter-box.wrong {
      border-color: var(--red); background: #fff5f5;
      animation: shake 0.35s ease;
    }
    @keyframes popIn {
      0%   { transform: scale(1.0); }
      50%  { transform: scale(1.22); }
      100% { transform: scale(1.0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-6px); }
      75%     { transform: translateX(6px); }
    }

    /* mic button per letter box */
    .mic-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: #e9ecef; color: #868e96;
      font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.12s;
      flex-shrink: 0;
    }
    .mic-btn:hover   { background: #dee2e6; transform: scale(1.1); }
    .mic-btn.active  {
      background: #ff4757; color: white;
      animation: micPulse 0.6s ease infinite alternate;
    }
    .mic-btn.correct { background: #d3f9d8; color: var(--teal2); pointer-events: none; }
    @keyframes micPulse {
      from { box-shadow: 0 0 0 0 rgba(255,71,87,0.5); }
      to   { box-shadow: 0 0 0 8px rgba(255,71,87,0); }
    }

    /* big "say it" banner shown while listening */
    #listening-banner {
      display: none;
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #ff4757; color: white;
      font-family: 'Fredoka One', cursive; font-size: 1.2rem;
      padding: 0.7rem 2rem; border-radius: 50px;
      box-shadow: 0 6px 20px rgba(255,71,87,0.45);
      z-index: 80; white-space: nowrap;
      animation: micPulse 0.6s ease infinite alternate;
    }

    /* hint */
    .hint-btn {
      background: none; border: 2px dashed #ced4da; border-radius: 50px;
      color: #adb5bd; font-family: 'Nunito', sans-serif; font-size: 0.9rem;
      font-weight: 700; padding: 0.4rem 1.2rem; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-bottom: 0.6rem;
    }
    .hint-btn:hover { border-color: var(--orange); color: var(--orange); }

    .status-msg {
      min-height: 1.8rem; font-size: 1rem; font-weight: 700;
      color: var(--red);
    }

    /* ── Success overlay ── */
    #success-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 100;
      align-items: center; justify-content: center;
    }
    #success-overlay.show { display: flex; }
    .success-card {
      background: white; border-radius: 32px; padding: 2.5rem 2rem;
      text-align: center; max-width: 340px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: popIn 0.35s ease;
    }
    .success-big   { font-size: 4rem; margin-bottom: 0.3rem; }
    .success-word  {
      font-family: 'Fredoka One', cursive; font-size: 2.2rem;
      color: var(--teal2); letter-spacing: 0.05em;
    }
    .success-label { color: #868e96; font-size: 0.95rem; margin: 0.3rem 0 1.2rem; }
    .next-btn {
      padding: 0.75rem 2.5rem; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--teal), var(--teal2));
      color: white; font-family: 'Fredoka One', cursive; font-size: 1.25rem;
      cursor: pointer; box-shadow: 0 6px 18px rgba(32,201,151,0.4);
      transition: transform 0.15s;
    }
    .next-btn:hover { transform: scale(1.06); }

    /* ── Final screen ── */
    #screen-final { width: 100%; display: none; text-align: center; }
    .final-card {
      background: white; border-radius: 28px; padding: 2.5rem 1.8rem;
      box-shadow: 0 12px 36px rgba(0,0,0,0.15);
    }
    .final-card h2 { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #333; margin-bottom: 0.5rem; }
    .final-card p  { color: #868e96; font-size: 1rem; margin-bottom: 1.5rem; }
    .restart-btn {
      padding: 0.75rem 2.2rem; border-radius: 50px; border: none;
      background: linear-gradient(135deg, var(--teal), var(--teal2));
      color: white; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
      cursor: pointer; box-shadow: 0 6px 18px rgba(32,201,151,0.4);
      transition: transform 0.15s;
    }
    .restart-btn:hover { transform: scale(1.06); }

    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
  </style>
</head>
<body>

<div id="bg-emojis"></div>
<canvas id="confetti-canvas"></canvas>
<div id="listening-banner">🎤 Say the letter!</div>

<div class="wrap">
  <div class="header">
    <h1>🔊 Phonic Spelling</h1>
    <p>Listen to the word — say each letter out loud!</p>
  </div>

  <!-- SCREEN 1: list selection -->
  <div id="screen-select">
    <div class="list-grid" id="list-grid"></div>
  </div>

  <!-- SCREEN 2: how many words -->
  <div id="screen-count">
    <div class="count-card">
      <h2 id="count-list-name"></h2>
      <p>How many words do you want to practise?</p>
      <div class="count-btns" id="count-btns"></div>
    </div>
  </div>

  <!-- SCREEN 3: game -->
  <div id="screen-game">
    <div class="prog-bar-wrap">
      <div class="prog-bar" id="prog-bar" style="width:0%"></div>
    </div>
    <div class="prog-label" id="prog-label">0 / 0</div>

    <div class="game-card">
      <div class="word-emoji" id="word-emoji">🔊</div>

      <button class="listen-btn" id="listen-btn" onclick="speakWord()">
        🔊 Listen
      </button>

      <div class="boxes-row" id="boxes-row"></div>

      <button class="hint-btn" id="hint-btn" onclick="showHint()">
        💡 Hint (show first letter)
      </button>

      <div class="status-msg" id="status-msg"></div>
    </div>
  </div>

  <!-- SCREEN 4: final -->
  <div id="screen-final">
    <div class="final-card">
      <div style="font-size:4rem">🏆</div>
      <h2>You did it!</h2>
      <p id="final-msg"></p>
      <button class="restart-btn" onclick="restart()">Play Again</button>
    </div>
  </div>
</div>

<!-- success overlay -->
<div id="success-overlay">
  <div class="success-card">
    <div class="success-big" id="suc-emoji">🎉</div>
    <div class="success-word" id="suc-word"></div>
    <div class="success-label">Correct! Well done! ⭐</div>
    <button class="next-btn" onclick="nextWord()">Next Word →</button>
  </div>
</div>

<script>
// ── Letter name → character map ───────────────────────────────────────────────
// Covers what Web Speech API commonly returns for letter names in en-US
const LETTER_MAP = {
  // Standard single letters
  a:1, b:1, c:1, d:1, e:1, f:1, g:1, h:1, i:1, j:1, k:1, l:1,
  m:1, n:1, o:1, p:1, q:1, r:1, s:1, t:1, u:1, v:1, w:1, x:1, y:1, z:1,
  // Phonetic spellings
  'ay':'a', 'eh':'a',
  'bee':'b', 'be':'b',
  'see':'c', 'sea':'c', 'si':'c',
  'dee':'d', 'di':'d',
  'ee':'e', 'eee':'e',
  'ef':'f', 'eff':'f',
  'gee':'g', 'ji':'g',
  'aitch':'h', 'haitch':'h', 'ach':'h',
  'eye':'i', 'ai':'i',
  'jay':'j',
  'kay':'k', 'ke':'k',
  'el':'l', 'ell':'l',
  'em':'m',
  'en':'n',
  'oh':'o', 'ow':'o',
  'pee':'p', 'pi':'p',
  'queue':'q', 'cue':'q', 'ku':'q',
  'are':'r', 'ar':'r',
  'ess':'s', 'es':'s',
  'tee':'t', 'ti':'t',
  'you':'u', 'yu':'u',
  'vee':'v', 've':'v',
  'double you':'w', 'double u':'w', 'doubleyou':'w',
  'ex':'x', 'eks':'x',
  'why':'y', 'wye':'y', 'wi':'y',
  'zed':'z', 'zee':'z', 'ze':'z'
};

function recogniseAsLetter(raw) {
  const s = raw.trim().toLowerCase();
  // exact single char
  if (s.length === 1 && LETTER_MAP[s]) return s;
  // map lookup
  if (LETTER_MAP[s] && LETTER_MAP[s] !== 1) return LETTER_MAP[s];
  if (LETTER_MAP[s] === 1) return s; // single char key
  // first word
  const first = s.split(/\s+/)[0];
  if (first.length === 1 && LETTER_MAP[first]) return first;
  if (LETTER_MAP[first] && LETTER_MAP[first] !== 1) return LETTER_MAP[first];
  if (LETTER_MAP[first] === 1) return first;
  return null;
}

// ── Speech Recognition setup ──────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let activeBoxIdx = null;   // which box is currently listening

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 5;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    stopListening();
    const alternatives = Array.from(e.results[0]).map(a => a.transcript);
    let letter = null;
    for (const alt of alternatives) {
      letter = recogniseAsLetter(alt);
      if (letter) break;
    }
    if (letter && activeBoxIdx !== null) {
      fillBoxWithLetter(activeBoxIdx, letter);
    } else {
      setStatus('😅 Didn\'t catch that — try again!');
    }
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      setStatus('🎤 Mic error: ' + e.error);
    }
  };

  recognition.onend = () => stopListening();
}

function startListening(idx) {
  if (!recognition) { setStatus('😢 Your browser doesn\'t support voice input.'); return; }
  if (activeBoxIdx !== null) { stopListening(); return; }

  activeBoxIdx = idx;
  document.getElementById('listening-banner').style.display = 'block';
  const micBtns = document.querySelectorAll('.mic-btn');
  if (micBtns[idx]) micBtns[idx].classList.add('active');

  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  document.getElementById('listening-banner').style.display = 'none';
  document.querySelectorAll('.mic-btn').forEach(b => b.classList.remove('active'));
  activeBoxIdx = null;
  try { recognition.stop(); } catch(e) {}
}

// ── State ─────────────────────────────────────────────────────────────────────
let queue      = [];
let currentIdx = 0;
let currentWord = '';
let hintUsed   = false;

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  const bgEl = document.getElementById('bg-emojis');
  ['🔊','🎵','✏️','📝','⭐','🎉','🌟','🔤'].forEach((e, i) => {
    const d = document.createElement('div');
    d.className = 'bg-emoji'; d.textContent = e;
    d.style.left = (10 + i * 11.5) + 'vw';
    d.style.animationDuration = (12 + i * 3) + 's';
    d.style.animationDelay    = (i * 1.5) + 's';
    bgEl.appendChild(d);
  });

  const grid = document.getElementById('list-grid');
  PHONIC_WORD_LISTS.forEach(list => {
    const card = document.createElement('div');
    card.className = 'list-card';
    card.innerHTML = `
      <span class="lc-emoji">${list.emoji}</span>
      <span class="lc-name">${list.name}</span>
      <span class="lc-count">${list.words.length} words</span>
    `;
    card.onclick = () => selectList(list);
    grid.appendChild(card);
  });
})();

// ── Screens ───────────────────────────────────────────────────────────────────
function show(id) {
  ['screen-select','screen-count','screen-game','screen-final'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = id === 'screen-game' ? 'flex' : 'block';
}

// ── List / count selection ────────────────────────────────────────────────────
let selectedList = null;

function selectList(list) {
  selectedList = list;
  document.getElementById('count-list-name').textContent = list.emoji + ' ' + list.name;
  const btns = document.getElementById('count-btns');
  btns.innerHTML = '';
  const total = list.words.length;
  [5, 8, 10, total]
    .filter((v, i, a) => v <= total && a.indexOf(v) === i)
    .forEach(n => {
      const b = document.createElement('button');
      b.className = 'count-btn';
      b.textContent = n === total ? `All (${n})` : n;
      b.onclick = () => startGame(n);
      btns.appendChild(b);
    });
  show('screen-count');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(n) {
  queue      = shuffle(selectedList.words).slice(0, n);
  currentIdx = 0;
  show('screen-game');
  loadWord();
}

// ── Load word ─────────────────────────────────────────────────────────────────
function loadWord() {
  stopListening();
  const entry = queue[currentIdx];
  currentWord = entry.word.toLowerCase();
  hintUsed    = false;

  const pct = Math.round((currentIdx / queue.length) * 100);
  document.getElementById('prog-bar').style.width  = pct + '%';
  document.getElementById('prog-label').textContent = currentIdx + ' / ' + queue.length;
  document.getElementById('word-emoji').textContent = entry.emoji;

  const hb = document.getElementById('hint-btn');
  hb.style.display = 'inline-block';
  hb.disabled      = false;
  hb.style.opacity = '1';

  setStatus('');
  buildBoxes(currentWord.length);
  setTimeout(speakWord, 400);
}

// ── Build boxes ───────────────────────────────────────────────────────────────
function buildBoxes(len) {
  const row = document.getElementById('boxes-row');
  row.innerHTML = '';
  for (let i = 0; i < len; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'box-wrap';

    // text input
    const inp = document.createElement('input');
    inp.type         = 'text';
    inp.maxLength    = 1;
    inp.className    = 'letter-box';
    inp.dataset.idx  = i;
    inp.autocomplete = 'off';
    inp.autocorrect  = 'off';
    inp.spellcheck   = false;
    inp.addEventListener('keydown', onKeyDown);
    inp.addEventListener('input',   onInput);

    // mic button below each box
    const mic = document.createElement('button');
    mic.className = 'mic-btn';
    mic.title     = 'Say this letter';
    mic.textContent = '🎤';
    mic.dataset.idx = i;
    mic.onclick = () => {
      if (!recognition) { setStatus('😢 Voice not supported in this browser.'); return; }
      focusBox(i);
      startListening(i);
    };

    if (!SpeechRecognition) mic.style.opacity = '0.3';

    wrap.appendChild(inp);
    wrap.appendChild(mic);
    row.appendChild(wrap);
  }
  focusBox(0);
}

function getBoxes()  { return Array.from(document.querySelectorAll('.letter-box')); }
function getMicBtns(){ return Array.from(document.querySelectorAll('.mic-btn')); }

function focusBox(i) {
  const boxes = getBoxes();
  if (boxes[i]) boxes[i].focus();
}

// ── Fill a box from voice ─────────────────────────────────────────────────────
function fillBoxWithLetter(i, letter) {
  const boxes = getBoxes();
  const box   = boxes[i];
  if (!box || box.disabled) return;

  const correct = (letter === currentWord[i]);
  box.value = letter.toUpperCase();
  box.classList.remove('correct','wrong');
  void box.offsetWidth;
  box.classList.add(correct ? 'correct' : 'wrong');

  if (!correct) {
    box.value = '';
    setTimeout(() => box.classList.remove('wrong'), 350);
    setStatus('Try again! 🙈');

    // play a short "no" beep via TTS
    if (window.speechSynthesis) {
      const u = new SpeechSynthesisUtterance('No, try again');
      u.lang = 'en-US'; u.rate = 1.1; u.volume = 0.6;
      speechSynthesis.speak(u);
    }
    return;
  }

  setStatus('');
  // lock this box & mic
  box.disabled = true;
  const micBtns = getMicBtns();
  if (micBtns[i]) { micBtns[i].classList.add('correct'); micBtns[i].disabled = true; }

  // speak the letter back
  if (window.speechSynthesis) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(letter);
    u.lang = 'en-US'; u.rate = 0.9;
    speechSynthesis.speak(u);
  }

  // check if all done
  setTimeout(() => {
    if (boxes.every(b => b.disabled || b.value !== '')) {
      // re-check: every box has a correct letter
      const allCorrect = boxes.every((b, idx) => b.value.toLowerCase() === currentWord[idx]);
      if (allCorrect) showSuccess();
      else {
        // find next empty
        const next = boxes.findIndex(b => !b.disabled && b.value === '');
        if (next !== -1) focusBox(next);
      }
    } else {
      // advance to next empty box
      const next = boxes.findIndex((b, idx) => idx > i && !b.disabled && b.value === '');
      if (next !== -1) focusBox(next);
    }
  }, 200);
}

// ── Keyboard input ────────────────────────────────────────────────────────────
function onKeyDown(e) {
  const boxes = getBoxes();
  const i = parseInt(this.dataset.idx);
  if (e.key === 'Backspace') {
    e.preventDefault();
    this.value = '';
    this.classList.remove('correct','wrong');
    if (i > 0) focusBox(i - 1);
    setStatus('');
  } else if (e.key === 'ArrowLeft'  && i > 0)               focusBox(i - 1);
  else if   (e.key === 'ArrowRight' && i < boxes.length - 1) focusBox(i + 1);
}

function onInput(e) {
  const i   = parseInt(this.dataset.idx);
  const val = this.value.replace(/[^a-zA-Z]/g, '').slice(-1).toLowerCase();
  if (!val) { this.value = ''; return; }
  this.value = val.toUpperCase();
  fillBoxWithLetter(i, val);
}

// ── Hint ──────────────────────────────────────────────────────────────────────
function showHint() {
  hintUsed = true;
  fillBoxWithLetter(0, currentWord[0]);
  const hb = document.getElementById('hint-btn');
  hb.disabled = true; hb.style.opacity = '0.4';
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function speakWord() {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(currentWord);
  utt.lang = 'en-US'; utt.rate = 0.85; utt.pitch = 1.05;
  const btn = document.getElementById('listen-btn');
  btn.classList.add('speaking');
  utt.onend = () => btn.classList.remove('speaking');
  speechSynthesis.speak(utt);
}

// ── Status helper ─────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// ── Success ───────────────────────────────────────────────────────────────────
function showSuccess() {
  stopListening();
  document.getElementById('suc-emoji').textContent = queue[currentIdx].emoji;
  document.getElementById('suc-word').textContent  = currentWord.toUpperCase();
  document.getElementById('success-overlay').classList.add('show');
  launchConfetti();
  setTimeout(() => {
    if (window.speechSynthesis) {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance('Correct! ' + currentWord);
      u.lang = 'en-US'; u.rate = 0.9;
      speechSynthesis.speak(u);
    }
  }, 300);
}

function nextWord() {
  document.getElementById('success-overlay').classList.remove('show');
  currentIdx++;
  if (currentIdx >= queue.length) showFinal();
  else loadWord();
}

function showFinal() {
  document.getElementById('prog-bar').style.width  = '100%';
  document.getElementById('prog-label').textContent = queue.length + ' / ' + queue.length;
  document.getElementById('final-msg').textContent =
    `You spelled all ${queue.length} words correctly! Amazing! 🌟`;
  show('screen-final');
  launchConfetti();
}

function restart() { show('screen-select'); }

// ── Confetti ──────────────────────────────────────────────────────────────────
let confettiAnim = null;
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols    = ['#20c997','#ffd43b','#ff922b','#845ef7','#ff4757','#74c0fc'];
  const pieces  = Array.from({ length: 90 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    r: 4 + Math.random() * 7,
    d: 2 + Math.random() * 3,
    color: cols[Math.floor(Math.random() * cols.length)],
    tilt: Math.random() * 10 - 5,
    ts: 0.1 + Math.random() * 0.15
  }));
  let angle = 0, ttl = 130;
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    angle += 0.01;
    pieces.forEach(p => {
      p.y += p.d; p.tilt += p.ts; p.x += Math.sin(angle) * 0.8;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r, p.r * 0.5, p.tilt, 0, Math.PI * 2);
      ctx.fillStyle = p.color; ctx.fill();
    });
    if (--ttl > 0) confettiAnim = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}
</script>
